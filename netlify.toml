# Configuración de despliegue en Netlify
[build]
  command = "pip install jinja2 && python scripts/genera_landings.py"
  publish = "dist"

[build.environment]
  PYTHON_VERSION = "3.11"

# Cabeceras de seguridad y caché
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
